<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ส่งเอกสาร — Alignment Doc Tracking</title>
<style>
body{font-family:Sarabun,sans-serif;background:linear-gradient(160deg,#F5EDD0,#EDE5CC);min-height:100vh;padding:28px 16px;margin:0;}
.hdr{text-align:center;margin-bottom:22px;}
.hdr h2{font-family:serif;font-size:17px;color:#3A2E0E;margin-bottom:6px;}
.pill{display:inline-block;background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#F5EDD0;padding:3px 16px;border-radius:20px;font-size:10px;letter-spacing:0.1em;}
.card{background:rgba(255,252,242,0.9);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:20px;max-width:460px;margin:0 auto;}
.ts{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.1);color:#6B5520;padding:5px 12px;border-radius:2px;font-size:11px;border:1px solid rgba(201,168,76,0.25);margin-bottom:14px;}
.ir{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(201,168,76,0.1);font-size:13px;}
.ir:last-of-type{border-bottom:none;}
.il{color:#9A7C3A;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
.iv{color:#3A2E0E;font-weight:500;}
.divider{height:1px;background:rgba(201,168,76,0.15);margin:14px 0;}
.lbl{display:block;font-size:10px;color:#8B6914;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.photo-area{border:1px dashed rgba(201,168,76,0.45);border-radius:4px;padding:22px;text-align:center;cursor:pointer;background:rgba(255,252,242,0.5);margin-bottom:12px;}
.photo-area:hover{background:rgba(245,237,208,0.8);}
#photo-prev{width:100%;max-height:200px;object-fit:cover;border-radius:2px;display:none;}
.ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:#9A7C3A;font-size:13px;}
.sub-btn{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#F5EDD0;border:none;border-radius:2px;font-size:12px;letter-spacing:0.1em;cursor:pointer;text-transform:uppercase;}
.sub-btn:disabled{opacity:0.4;cursor:not-allowed;}
.ok{text-align:center;padding:28px;display:none;}
.err{color:#8B3A1A;font-size:12px;margin-top:8px;display:none;}
.not-found{color:#8B3A1A;font-size:13px;padding:12px 0;}
</style>
</head>
<body>
<div class="hdr">
  <h2>ส่งเอกสาร</h2>
  <div class="pill">Alignment Doc Tracking</div>
</div>
<div class="card">
  <div id="main-content">
    <div class="ts" id="ts-badge">⏳ —</div>
    <div id="job-info"><div style="text-align:center;padding:20px;color:#9A7C3A;">กำลังโหลด...</div></div>
    <div class="divider"></div>
    <label class="lbl">ถ่ายรูปซอง <span style="color:#C9A84C;">*</span></label>
    <div class="photo-area" onclick="document.getElementById('photo-inp').click()">
      <input type="file" id="photo-inp" accept="image/*" capture="environment" onchange="prevPhoto(event)" style="display:none;">
      <img id="photo-prev">
      <div class="ph" id="photo-ph">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#9A7C3A" stroke-width="1.5"><rect x="3" y="7" width="18" height="14" rx="2"/><circle cx="12" cy="14" r="3"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span style="color:#6B5520;">แตะเพื่อถ่ายรูปซอง</span>
        <span style="font-size:11px;">รูปจะมี Timestamp กำกับอัตโนมัติ</span>
      </div>
    </div>
    <button class="sub-btn" id="sub-btn" onclick="submitDoc()">ยืนยันการส่งเอกสาร</button>
    <div class="err" id="err-msg"></div>
  </div>
  <div class="ok" id="success-box">
    <div style="font-size:28px;margin-bottom:10px;">⛜</div>
    <div style="font-family:serif;font-size:16px;color:#8B6914;margin-bottom:6px;">ส่งเอกสารสำเร็จ</div>
    <div style="font-size:13px;color:#6B5520;">ระบบบันทึกและแจ้งเตือนเจ้าหน้าที่แล้ว</div>
  </div>
</div>
<script>
var photoData=null;
var jobId=new URLSearchParams(window.location.search).get('sup');

function tick(){document.getElementById('ts-badge').textContent='⏳ '+new Date().toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'medium'});}
tick();setInterval(tick,1000);

async function loadJob(){
  if(!jobId){document.getElementById('job-info').innerHTML='<div class="not-found">ไม่พบข้อมูลงาน — กรุณาติดต่อเจ้าหน้าที่</div>';return;}
  var r=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getJobById',jobId:jobId})});
  var d=await r.json();
  if(!d.ok||!d.job){document.getElementById('job-info').innerHTML='<div class="not-found">ไม่พบข้อมูลงาน — กรุณาติดต่อเจ้าหน้าที่</div>';return;}
  var j=d.job;
  var html='<div class="ir"><span class="il">โครงการ</span><span class="iv">'+j.proj+'</span></div>'+
    '<div class="ir"><span class="il">เลขที่</span><span class="iv">'+j.ref+'</span></div>'+
    '<div class="ir"><span class="il">Supplier</span><span class="iv">'+j.supplier+'</span></div>'+
    '<div class="ir"><span class="il">ประเภท</span><span class="iv">'+j.type+'</span></div>'+
    (j.deadline?'<div class="ir"><span class="il">Deadline</span><span class="iv">'+j.deadline+'</span></div>':'');
  document.getElementById('job-info').innerHTML=html;
  if(j.status==='received'){
    document.getElementById('main-content').style.display='none';
    document.getElementById('success-box').style.display='block';
    document.querySelector('#success-box div:nth-child(2)').textContent='ส่งเอกสารแล้ว';
    document.querySelector('#success-box div:nth-child(3)').textContent='งานนี้ได้รับเอกสารแล้ว';
  }
}
loadJob();

function prevPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){photoData=ev.target.result;var img=document.getElementById('photo-prev');img.src=photoData;img.style.display='block';document.getElementById('photo-ph').style.display='none';};
  r.readAsDataURL(f);
}

async function submitDoc(){
  if(!photoData){showErr('กรุณาถ่ายรูปซองก่อน');return;}
  var btn=document.getElementById('sub-btn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    var r=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'supplierSubmit',jobId:jobId,photoBase64:photoData})});
    var d=await r.json();
    if(d.ok){document.getElementById('main-content').style.display='none';document.getElementById('success-box').style.display='block';}
    else{showErr('เกิดข้อผิดพลาด: '+(d.error||'Unknown'));btn.disabled=false;btn.textContent='ยืนยันการส่งเอกสาร';}
  }catch(e){showErr('ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่');btn.disabled=false;btn.textContent='ยืนยันการส่งเอกสาร';}
}

function showErr(msg){var e=document.getElementById('err-msg');e.textContent=msg;e.style.display='block';}
</script>
</body>
</html>
